<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Industrial</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single+Ink:wght@100..900&display=swap");

      :root {
        color-scheme: dark;
        --ink: #000;
        --fog: rgba(255, 255, 255, 0.08);
        --bone: #f2f2f2;
        --rust: #aa2323;
        --rust-glow: rgba(170, 35, 35, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: var(--ink);
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        position: relative;
        font-family: "Arial Narrow", "Franklin Gothic Medium", "Impact", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          rgba(255, 255, 255, 0.02) 3px
        );
        mix-blend-mode: screen;
        opacity: 0.35;
        z-index: 1;
      }

      .hero-video {
        width: 100vw;
        height: 100vh;
        display: block;
        object-fit: cover;
        background: #000;
      }

      .watermark {
        position: fixed;
        top: 10px;
        right: 14px;
        z-index: 2;
        width: min(22vw, 148px);
        opacity: 0.9;
        filter:
          drop-shadow(0 0 10px rgba(255, 42, 42, 0.45))
          drop-shadow(0 0 22px rgba(140, 0, 0, 0.35));
        animation: watermark-flicker 8s steps(1, end) infinite;
        pointer-events: none;
        user-select: none;
      }

      .watermark .sign-jp {
        font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
      }

      .watermark .sign-en {
        font-family: "Bitcount Grid Single Ink", monospace;
        fill: #fff1f1;
        filter: drop-shadow(0 0 8px rgba(255, 120, 120, 0.75));
      }

      @keyframes watermark-flicker {
        0%,
        74%,
        100% {
          transform: translate3d(0, 0, 0);
          opacity: 0.9;
        }

        75% {
          transform: translate3d(0, 1px, 0);
          opacity: 0.78;
        }

        76% {
          transform: translate3d(1px, 0, 0);
          opacity: 0.97;
        }

        77% {
          transform: translate3d(-1px, 0, 0);
          opacity: 0.72;
        }

        78% {
          transform: translate3d(0, 0, 0);
          opacity: 0.92;
        }

        90% {
          transform: translate3d(0, 0, 0);
          opacity: 0.84;
        }

        91% {
          transform: translate3d(0, -1px, 0);
          opacity: 1;
        }

        92% {
          transform: translate3d(0, 0, 0);
          opacity: 0.86;
        }

        93% {
          transform: translate3d(1px, 0, 0);
          opacity: 0.95;
        }

        94%,
        100% {
          transform: translate3d(0, 0, 0);
          opacity: 0.9;
        }
      }

      .audio-dock {
        position: fixed;
        left: 20px;
        right: 20px;
        bottom: 20px;
        z-index: 2;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--fog);
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.88), rgba(10, 10, 10, 0.9));
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(255, 255, 255, 0.03);
      }

      .play-link,
      .download-link {
        color: var(--bone);
        text-decoration: none;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        border: 1px solid var(--bone);
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.7);
        font: inherit;
        cursor: pointer;
      }

      .play-link:hover,
      .play-link:focus-visible,
      .download-link:hover,
      .download-link:focus-visible {
        background: var(--bone);
        color: #000;
      }

      .wave-shell {
        min-width: 0;
      }

      #waveform {
        width: 100%;
        height: 96px;
        display: block;
        cursor: pointer;
        border: 1px solid var(--fog);
        background: linear-gradient(145deg, rgba(0, 0, 0, 0.96), rgba(18, 18, 18, 0.9));
      }

      .time-row {
        display: flex;
        justify-content: space-between;
        color: var(--bone);
        margin-top: 6px;
        letter-spacing: 0.1em;
        font-size: 11px;
        opacity: 0.92;
      }

      @media (max-width: 900px) {
        .watermark {
          top: 10px;
          right: 10px;
          width: min(28vw, 118px);
        }

        .audio-dock {
          grid-template-columns: 1fr;
        }

        .play-link,
        .download-link {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <svg class="watermark" viewBox="0 0 320 520" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="panel" x1="35" y1="22" x2="262" y2="470" gradientUnits="userSpaceOnUse">
          <stop stop-color="#160606" />
          <stop offset="1" stop-color="#040404" />
        </linearGradient>
        <linearGradient id="tube" x1="82" y1="76" x2="244" y2="414" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FF8F8F" />
          <stop offset="0.4" stop-color="#FF4747" />
          <stop offset="1" stop-color="#A30000" />
        </linearGradient>
        <filter id="redGlow" x="0" y="0" width="320" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
          <feGaussianBlur stdDeviation="10" result="blur" />
        </filter>
        <filter id="softRed" x="18" y="18" width="284" height="484" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
          <feGaussianBlur stdDeviation="3.5" />
        </filter>
      </defs>

      <g opacity="0.3" filter="url(#redGlow)">
        <rect x="44" y="34" width="220" height="452" rx="20" fill="#D81616" />
        <path d="M87 90H221V102H87V90Z" fill="#FF5A5A" />
        <path d="M87 156H221V168H87V156Z" fill="#FF5A5A" />
        <path d="M87 222H221V234H87V222Z" fill="#FF5A5A" />
        <path d="M87 288H221V300H87V288Z" fill="#FF5A5A" />
        <path d="M87 354H221V366H87V354Z" fill="#FF5A5A" />
        <path d="M87 420H221V432H87V420Z" fill="#FF5A5A" />
      </g>

      <rect x="54" y="42" width="204" height="436" rx="18" fill="url(#panel)" stroke="#3B0F0F" stroke-width="4" />
      <rect x="67" y="56" width="178" height="408" rx="12" stroke="#631111" stroke-width="2" />

      <g opacity="0.72" filter="url(#softRed)">
        <path d="M103 98H211V108H103V98Z" fill="#FF5252" />
        <path d="M103 168H211V178H103V168Z" fill="#FF5252" />
        <path d="M103 238H211V248H103V238Z" fill="#FF5252" />
        <path d="M103 308H211V318H103V308Z" fill="#FF5252" />
        <path d="M103 378H211V388H103V378Z" fill="#FF5252" />
      </g>

      <g stroke="url(#tube)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M103 101H210" />
        <path d="M103 171H210" />
        <path d="M103 241H210" />
        <path d="M103 311H210" />
        <path d="M103 381H210" />

        <path d="M103 92V128" />
        <path d="M156 92V128" />
        <path d="M210 92V128" />

        <path d="M103 162V198" />
        <path d="M156 162V198" />
        <path d="M210 162V198" />

        <path d="M103 232V268" />
        <path d="M156 232V268" />
        <path d="M210 232V268" />

        <path d="M103 302V338" />
        <path d="M156 302V338" />
        <path d="M210 302V338" />

        <path d="M103 372V408" />
        <path d="M156 372V408" />
        <path d="M210 372V408" />
      </g>

      <g fill="#FFD7D7">
        <text class="sign-jp" x="157" y="132" text-anchor="middle" font-size="52" font-weight="700" letter-spacing="6">闇資金</text>
        <text class="sign-jp" x="157" y="184" text-anchor="middle" font-size="20" font-weight="700" letter-spacing="6" opacity="0.96">やみしきん</text>
        <text class="sign-en" x="157" y="296" text-anchor="middle" font-size="34" font-weight="700" letter-spacing="4">DARK</text>
        <text class="sign-en" x="157" y="348" text-anchor="middle" font-size="34" font-weight="700" letter-spacing="4">MONEY</text>
      </g>

      <g opacity="0.5">
        <circle cx="84" cy="72" r="3.5" fill="#702020" />
        <circle cx="228" cy="72" r="3.5" fill="#702020" />
        <circle cx="84" cy="448" r="3.5" fill="#702020" />
        <circle cx="228" cy="448" r="3.5" fill="#702020" />
      </g>
    </svg>

    <video
      class="hero-video"
      src="images/homepage faces.mp4"
      autoplay
      loop
      muted
      playsinline
      preload="auto"
      aria-label="Looping industrial video"
    ></video>

    <div class="audio-dock">
      <button class="play-link" id="play-link" type="button">James</button>
      <div class="wave-shell">
        <canvas id="waveform" width="1200" height="96" aria-label="Song waveform seek control"></canvas>
        <div class="time-row">
          <span id="current-time">00:00</span>
          <span id="total-time">00:00</span>
        </div>
      </div>
      <a class="download-link" href="music/James.mp3" download="James.mp3">Download</a>
    </div>

    <audio id="bg-audio" src="music/James.mp3" preload="auto"></audio>

    <script>
      const heroVideo = document.querySelector(".hero-video");
      const playLink = document.querySelector("#play-link");
      const bgAudio = document.querySelector("#bg-audio");
      const waveform = document.querySelector("#waveform");
      const currentTimeEl = document.querySelector("#current-time");
      const totalTimeEl = document.querySelector("#total-time");

      let bars = [];
      let dragSeeking = false;

      function formatTime(seconds) {
        if (!Number.isFinite(seconds)) {
          return "00:00";
        }
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      function drawWave(progress = 0) {
        if (!waveform) {
          return;
        }

        const ctx = waveform.getContext("2d");
        const width = waveform.width;
        const height = waveform.height;

        ctx.clearRect(0, 0, width, height);

        if (!bars.length) {
          return;
        }

        const count = bars.length;
        const step = width / count;
        const barWidth = Math.max(1, step * 0.72);
        const progressIndex = Math.floor(progress * count);

        for (let i = 0; i < count; i += 1) {
          const value = bars[i];
          const barHeight = 8 + value * (height * 0.8);
          const x = i * step;
          const y = (height - barHeight) / 2;

          if (i <= progressIndex) {
            ctx.fillStyle = "rgba(206, 48, 48, 0.96)";
            ctx.shadowColor = "rgba(206, 48, 48, 0.5)";
            ctx.shadowBlur = 8;
          } else {
            ctx.fillStyle = "rgba(230, 230, 230, 0.32)";
            ctx.shadowBlur = 0;
          }
          ctx.fillRect(x, y, barWidth, barHeight);
        }

        const playheadX = Math.min(width - 1, Math.max(0, progress * width));
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.82)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(playheadX, 0);
        ctx.lineTo(playheadX, height);
        ctx.stroke();
      }

      function seekFromPointer(clientX) {
        if (!bgAudio || !Number.isFinite(bgAudio.duration) || !waveform) {
          return;
        }
        const rect = waveform.getBoundingClientRect();
        const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
        bgAudio.currentTime = ratio * bgAudio.duration;
      }

      async function buildWaveformFromAudio() {
        if (!bgAudio || !waveform) {
          return;
        }

        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          const audioCtx = new AudioCtx();
          const response = await fetch(bgAudio.currentSrc || bgAudio.src);
          const buffer = await response.arrayBuffer();
          const decoded = await audioCtx.decodeAudioData(buffer.slice(0));
          const sourceData = decoded.getChannelData(0);
          const barCount = 320;
          const blockSize = Math.max(1, Math.floor(sourceData.length / barCount));
          const nextBars = [];

          for (let i = 0; i < barCount; i += 1) {
            let sum = 0;
            const start = i * blockSize;
            const end = start + blockSize;
            for (let j = start; j < end; j += 1) {
              sum += Math.abs(sourceData[j] || 0);
            }
            nextBars.push(sum / blockSize);
          }

          const peak = Math.max(...nextBars, 0.0001);
          bars = nextBars.map((n) => Math.pow(n / peak, 0.62));

          totalTimeEl.textContent = formatTime(decoded.duration);
          audioCtx.close();
          drawWave(0);
        } catch (error) {
          const fallbackCount = 260;
          bars = Array.from({ length: fallbackCount }, (_, i) => {
            const wave = Math.sin(i * 0.33) * 0.22 + 0.5;
            const grit = ((i * 37) % 17) / 20;
            return Math.max(0.12, Math.min(1, wave + grit));
          });
          drawWave(0);
        }
      }

      if (heroVideo) {
        heroVideo.muted = true;
        heroVideo.defaultMuted = true;
        heroVideo.volume = 0;
      }

      if (playLink && bgAudio) {
        playLink.addEventListener("click", async () => {
          try {
            if (bgAudio.paused) {
              await bgAudio.play();
            } else {
              bgAudio.pause();
            }
          } catch (error) {
            playLink.textContent = "Click To Start Audio";
          }
        });
      }

      if (waveform) {
        waveform.addEventListener("pointerdown", (event) => {
          dragSeeking = true;
          seekFromPointer(event.clientX);
          waveform.setPointerCapture(event.pointerId);
        });

        waveform.addEventListener("pointermove", (event) => {
          if (dragSeeking) {
            seekFromPointer(event.clientX);
          }
        });

        waveform.addEventListener("pointerup", () => {
          dragSeeking = false;
        });

        waveform.addEventListener("pointerleave", () => {
          dragSeeking = false;
        });
      }

      if (bgAudio) {
        bgAudio.addEventListener("loadedmetadata", () => {
          totalTimeEl.textContent = formatTime(bgAudio.duration);
        });

        bgAudio.addEventListener("timeupdate", () => {
          currentTimeEl.textContent = formatTime(bgAudio.currentTime);
          const progress = bgAudio.duration ? bgAudio.currentTime / bgAudio.duration : 0;
          drawWave(progress);
        });
      }

      buildWaveformFromAudio();
    </script>
  </body>
</html>
